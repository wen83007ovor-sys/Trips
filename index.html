<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>旅遊行程</title>
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/FileSaver.js/2.0.5/FileSaver.min.js"></script>
    <script src="https://cdn.jsdelivr.net/gh/evidenceprime/html-docx-js@master/dist/html-docx.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>

    <style>
        * { box-sizing: border-box; -webkit-print-color-adjust: exact; print-color-adjust: exact; }

        :root {
            --primary-color: #2c3e50;
            --accent-color: #2980b9;
            --bg-color: #f0f2f5;
            --paper-color: #ffffff;
        }

        body {
            font-family: "Microsoft JhengHei", "Heiti TC", sans-serif;
            background-color: var(--bg-color);
            margin: 0; padding: 0;
            display: flex; flex-direction: column; align-items: center;
            min-height: 100vh;
        }

        /* 預覽模式背景 */
        body.preview-mode { background-color: #333 !important; }

        .container {
            width: 95%;
            max-width: 210mm;
            min-height: 297mm;
            background: var(--paper-color);
            padding: 15px;
            margin: 10px auto 140px auto; 
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            position: relative;
        }

        .company-header input {
            font-size: 20pt; font-weight: bold; text-align: center; border: none;
            border-bottom: 2px solid #eee; width: 100%; color: var(--primary-color);
            background: transparent; margin-bottom: 10px;
        }
        h1 { text-align: center; border-bottom: 3px double #000; padding-bottom: 10px; font-size: 24pt; margin: 10px 0 20px 0; }

        .form-section { display: grid; grid-template-columns: 1fr; gap: 8px; margin-bottom: 20px; }
        @media (min-width: 600px) { .form-section { grid-template-columns: 1fr 1fr; gap: 15px; } }
        .form-group { display: flex; align-items: center; border-bottom: 1px solid #eee; padding: 5px 0; }
        label { font-size: 10.5pt; font-weight: bold; min-width: 80px; color: #333; }
        input, textarea { padding: 8px; border: 1px solid #ddd; border-radius: 4px; font-size: 11pt; width: 100%; background: #fafafa; }
        
        .cost-table { width: 100%; border-collapse: collapse; margin-bottom: 20px; }
        .cost-table th, .cost-table td { border: 1px solid #000; padding: 8px; font-size: 10.5pt; }
        .cost-table th { background-color: #f8f9fa; width: 85px; text-align: center; }

        .day-group { margin-bottom: 20px; border: 1px solid #ddd; border-radius: 8px; overflow: hidden; background: #fff; }
        .day-header { background: var(--primary-color); color: #fff; padding: 12px; font-weight: bold; font-size: 14px; }
        .items-list { padding: 8px; }
        .itinerary-item { display: flex; gap: 5px; margin-bottom: 10px; align-items: flex-start; }
        .ipt-time { width: 65px; flex-shrink: 0; text-align: center; font-weight: bold; }
        
        .add-act-wrapper { text-align: center; padding: 10px; background: #f9f9f9; border-top: 1px dashed #ccc; }
        .btn-add { background: #5da5da; color: white; border: none; padding: 10px 20px; border-radius: 20px; font-size: 14px; }

        .note-area { padding: 10px; background: #fffbe6; border-top: 1px solid #eee; }
        .note-label { font-weight: bold; color: #856404; font-size: 10pt; display: block; margin-bottom: 5px; }

        /* --- 工具列修正重點 --- */
        .toolbar-fixed {
            position: fixed;
            bottom: 0;
            left: 0;
            width: 100%;
            background: #ffffff;
            z-index: 10000; /* 提高層級 */
            box-shadow: 0 -3px 15px rgba(0,0,0,0.3);
            padding: 12px 10px calc(15px + env(safe-area-inset-bottom)); 
            display: flex;
            justify-content: center;
            gap: 8px;
        }

        .btn-group { display: flex; width: 100%; max-width: 600px; gap: 8px; }

        .btn {
            flex: 1;
            padding: 12px 2px;
            border-radius: 8px;
            border: none;
            font-weight: bold;
            color: #fff;
            font-size: 13px;
            text-align: center;
            cursor: pointer;
        }

        .btn-edit-save { background: #e67e22; }
        .btn-edit-load { background: #8e44ad; }
        .btn-edit-gen { background: #27ae60; }
        .btn-edit-preview { background: #34495e; }
        
        .btn-pre-back { background: #7f8c8d; }
        .btn-pre-pdf { background: #c0392b; }
        .btn-pre-word { background: #2980b9; }

        .hidden { display: none !important; }

        /* 核心修正：預覽模式下不要隱藏帶有 no-print 的工具列 */
        body.preview-mode .no-print:not(.toolbar-fixed) { 
            display: none !important; 
        }

        /* 只有在真正的列印時才完全隱藏工具列 */
        @media print {
            .no-print { display: none !important; }
            .toolbar-fixed { display: none !important; }
        }

        /* 預覽模式內的輸入框樣式 */
        body.preview-mode input, body.preview-mode textarea { 
            border: none !important; 
            background: transparent !important; 
            pointer-events: none; 
        }
    </style>
</head>
<body>

    <div class="container" id="pdfArea">
        <div class="company-header">
            <input type="text" id="ipt_agency" placeholder="輸入旅行社名稱">
        </div>
        <h1>旅遊行程</h1>
        <div class="form-section">
            <div class="form-group"><label>客戶名稱：</label><input type="text" id="ipt_company"></div>
            <div class="form-group"><label>聯絡窗口：</label><input type="text" id="ipt_contact"></div>
            <div class="form-group"><label>聯絡電話：</label><input type="text" id="ipt_phone"></div>
            <div class="form-group"><label>出發日期：</label><input type="date" id="ipt_date"></div>
            <div class="form-group"><label>行程天數：</label><input type="number" id="ipt_days" value=""></div>
        </div>
        <table class="cost-table">
            <tr><th>個人團費</th><td><input type="text" id="ipt_c1" placeholder="$ /人"></td></tr>
            <tr><th>餐食交通</th><td><input type="text" id="ipt_c2" placeholder="說明"></td></tr>
            <tr><th>住宿安排</th><td><input type="text" id="ipt_c3" placeholder="飯店房型"></td></tr>
            <tr><th>費用包含</th><td><input type="text" id="ipt_c4" placeholder="門票保險等"></td></tr>
            <tr><th>備註事項</th><td><input type="text" id="ipt_c5" placeholder="注意事項"></td></tr>
        </table>
        <div id="itineraryContainer">
            <p style="text-align: center; color: #999; padding: 30px;">請點擊下方「生成」按鈕</p>
        </div>
    </div>

    <!-- 加入 toolbar-fixed 確保不被隱藏規則誤殺 -->
    <div class="toolbar-fixed no-print">
        <div id="group-edit" class="btn-group">
            <button class="btn btn-edit-save" onclick="saveData()">💾存檔</button>
            <button class="btn btn-edit-load" onclick="loadData()">📂讀檔</button>
            <button class="btn btn-edit-gen" onclick="buildItinerary()">1.生成</button>
            <button class="btn btn-edit-preview" onclick="toggleMode(true)">2.預覽</button>
        </div>

        <div id="group-preview" class="btn-group hidden">
            <button class="btn btn-pre-back" onclick="toggleMode(false)">⬅返回</button>
            <button class="btn btn-pre-pdf" onclick="downloadPDF()">📥PDF</button>
            <button class="btn btn-pre-word" onclick="downloadWord()">📥Word</button>
        </div>
    </div>

    <script>
        // 文字框自動縮放
        function autoHeight(el) { 
            el.style.height = 'auto'; 
            el.style.height = el.scrollHeight + 'px'; 
        }
        
        // 生成行程
        function buildItinerary(existingData = null) {
            const days = existingData ? existingData.daysCount : document.getElementById('ipt_days').value;
            const start = document.getElementById('ipt_date').value;
            const container = document.getElementById('itineraryContainer');
            if (!days || days <= 0) return alert("請輸入天數");
            
            container.innerHTML = '';
            let d = start ? new Date(start) : null;
            for(let i=1; i<=days; i++) {
                let dateStr = d ? `${d.getMonth()+1}/${d.getDate()}` : `Day ${i}`;
                if(d) d.setDate(d.getDate()+1);
                
                let itemsHtml = '';
                if(existingData && existingData.days[i-1]) {
                    existingData.days[i-1].items.forEach(item => {
                        itemsHtml += createItemRow(item.time, item.content);
                    });
                } else {
                    itemsHtml = createItemRow("08:00", "");
                }
                const noteVal = (existingData && existingData.days[i-1]) ? existingData.days[i-1].note : "";

                const group = document.createElement('div');
                group.className = 'day-group';
                group.innerHTML = `
                    <div class="day-header">Day ${i} (${dateStr})</div>
                    <div class="items-list">${itemsHtml}</div>
                    <div class="add-act-wrapper no-print"><button class="btn-add" onclick="addAct(this)">+ 增加項目</button></div>
                    <div class="note-area"><span class="note-label">當日備註：</span><textarea class="ipt-note" rows="1">${noteVal}</textarea></div>`;
                container.appendChild(group);
            }
            document.querySelectorAll('textarea').forEach(t => autoHeight(t));
        }

        function createItemRow(time, content) {
            return `<div class="itinerary-item">
                <input type="text" class="ipt-time" value="${time}">
                <textarea placeholder="行程內容..." rows="1" oninput="autoHeight(this)">${content}</textarea>
                <button class="no-print" onclick="this.parentElement.remove()" style="border:none; background:none; color:red; font-size:20px; padding:0 5px;">×</button>
            </div>`;
        }

        function addAct(btn) {
            const list = btn.closest('.day-group').querySelector('.items-list');
            const div = document.createElement('div');
            div.innerHTML = createItemRow("", "");
            list.appendChild(div.firstElementChild);
        }

        // 切換模式
        function toggleMode(isPreview) {
            const editGroup = document.getElementById('group-edit');
            const previewGroup = document.getElementById('group-preview');

            if (isPreview) {
                document.body.classList.add('preview-mode');
                editGroup.classList.add('hidden');
                previewGroup.classList.remove('hidden');
            } else {
                document.body.classList.remove('preview-mode');
                editGroup.classList.remove('hidden');
                previewGroup.classList.add('hidden');
            }
            document.querySelectorAll('input, textarea').forEach(el => el.readOnly = isPreview);
            window.scrollTo(0, 0);
        }

        // 存檔與讀檔
        function saveData() {
            const days = [];
            document.querySelectorAll('.day-group').forEach(group => {
                const items = [];
                group.querySelectorAll('.itinerary-item').forEach(it => {
                    items.push({ time: it.querySelector('.ipt-time').value, content: it.querySelector('textarea').value });
                });
                days.push({ items: items, note: group.querySelector('.ipt-note').value });
            });
            const data = {
                agency: document.getElementById('ipt_agency').value,
                company: document.getElementById('ipt_company').value,
                contact: document.getElementById('ipt_contact').value,
                phone: document.getElementById('ipt_phone').value,
                date: document.getElementById('ipt_date').value,
                daysCount: document.getElementById('ipt_days').value,
                costs: [1,2,3,4,5].map(i => document.getElementById('ipt_c'+i).value),
                days: days
            };
            localStorage.setItem('trip_save_final', JSON.stringify(data));
            alert("✅ 存檔成功");
        }

        function loadData() {
            const data = JSON.parse(localStorage.getItem('trip_save_final'));
            if(!data) return alert("無存檔紀錄");
            document.getElementById('ipt_agency').value = data.agency || "";
            document.getElementById('ipt_company').value = data.company || "";
            document.getElementById('ipt_contact').value = data.contact || "";
            document.getElementById('ipt_phone').value = data.phone || "";
            document.getElementById('ipt_date').value = data.date || "";
            document.getElementById('ipt_days').value = data.daysCount || 3;
            data.costs.forEach((v, i) => document.getElementById('ipt_c'+(i+1)).value = v);
            buildItinerary(data);
            alert("📂 讀檔完成");
        }

        // 下載功能
        function downloadPDF() {
            const element = document.getElementById('pdfArea');
            const opt = {
                margin: 5,
                filename: '行程表.pdf',
                image: { type: 'jpeg', quality: 0.98 },
                html2canvas: { scale: 2, useCORS: true, windowWidth: 794 },
                jsPDF: { unit: 'mm', format: 'a4', orientation: 'portrait' }
            };
            html2pdf().set(opt).from(element).save();
        }

        function downloadWord() {
            const area = document.getElementById('pdfArea').cloneNode(true);
            area.querySelectorAll('.no-print').forEach(n => n.remove());
            area.querySelectorAll('input, textarea').forEach(el => {
                const span = document.createElement('span');
                span.innerHTML = el.value.replace(/\n/g, '<br>');
                el.replaceWith(span);
            });
            const html = `<html><head><meta charset="utf-8"></head><body>${area.innerHTML}</body></html>`;
            const converted = htmlDocx.asBlob(html);
            saveAs(converted, '行程表.docx');
        }
    </script>
</body>
</html>
