<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>旅遊行程</title>
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/FileSaver.js/2.0.5/FileSaver.min.js"></script>
    <script src="https://cdn.jsdelivr.net/gh/evidenceprime/html-docx-js@master/dist/html-docx.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>

    <style>
        * { box-sizing: border-box; -webkit-print-color-adjust: exact; print-color-adjust: exact; }

        :root {
            --primary-color: #2c3e50;
            --accent-color: #2980b9;
            --bg-color: #f0f2f5;
            --paper-color: #ffffff;
            --save-color: #e67e22; 
        }

        body {
            font-family: "Microsoft JhengHei", "Heiti TC", sans-serif;
            background-color: var(--bg-color);
            margin: 0; padding: 0;
            display: flex; flex-direction: column; align-items: center;
            min-height: 100vh;
        }

        /* --- 容器設計 --- */
        .container {
            width: 95%;
            max-width: 210mm;
            min-height: 297mm;
            background: var(--paper-color);
            padding: 15px;
            margin: 10px auto 120px auto; /* 底部預留空間給工具列 */
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            position: relative;
            z-index: 1;
        }

        /* 預覽模式背景變深，凸顯文件 */
        body.preview-mode { background-color: #333; }
        body.preview-mode .container { margin-top: 20px; box-shadow: 0 0 30px rgba(0,0,0,0.5); }

        /* 公司抬頭 */
        .company-header input {
            font-size: 20pt; font-weight: bold; text-align: center; border: none;
            border-bottom: 2px solid #eee; width: 100%; color: var(--primary-color);
            background: transparent; margin-bottom: 10px;
        }

        h1 { text-align: center; border-bottom: 3px double #000; padding-bottom: 10px; font-size: 24pt; margin: 10px 0 20px 0; }

        /* 表單區塊 */
        .form-section { display: grid; grid-template-columns: 1fr; gap: 8px; margin-bottom: 20px; }
        @media (min-width: 600px) { .form-section { grid-template-columns: 1fr 1fr; gap: 15px; } }

        .form-group { display: flex; align-items: center; border-bottom: 1px solid #eee; padding: 5px 0; }
        label { font-size: 10.5pt; font-weight: bold; min-width: 80px; color: #333; }
        input, textarea { padding: 8px; border: 1px solid #ddd; border-radius: 4px; font-size: 11pt; width: 100%; background: #fafafa; }
        
        .cost-table { width: 100%; border-collapse: collapse; margin-bottom: 20px; table-layout: fixed; }
        .cost-table th, .cost-table td { border: 1px solid #000; padding: 8px; font-size: 10.5pt; word-break: break-all; }
        .cost-table th { background-color: #f8f9fa; width: 85px; text-align: center; }

        /* 行程區塊 */
        .day-group { margin-bottom: 20px; border: 1px solid #ddd; border-radius: 8px; overflow: hidden; background: #fff; }
        .day-header { background: var(--primary-color); color: #fff; padding: 12px; font-weight: bold; font-size: 14px; }
        
        .items-list { padding: 8px; }
        .itinerary-item { display: flex; gap: 5px; margin-bottom: 10px; align-items: flex-start; }
        .ipt-time { width: 65px; flex-shrink: 0; text-align: center; font-weight: bold; padding: 5px; }
        
        .add-act-wrapper { text-align: center; padding: 10px; background: #f9f9f9; border-top: 1px dashed #ccc; border-bottom: 1px dashed #ccc; }
        .btn-add { background: #5da5da; color: white; border: none; padding: 10px 25px; border-radius: 25px; font-size: 14px; cursor: pointer; }

        .note-area { padding: 10px; background: #fffbe6; }
        .note-label { font-weight: bold; color: #856404; font-size: 10pt; display: block; margin-bottom: 5px; }

        /* --- 核心修正：底部工具列 --- */
        .toolbar {
            position: fixed; bottom: 0; left: 0; width: 100%; 
            background: #ffffff; padding: 12px 5px;
            display: flex; justify-content: center; gap: 6px; flex-wrap: wrap;
            z-index: 99999; /* 確保在最上層 */
            box-shadow: 0 -3px 15px rgba(0,0,0,0.2);
            border-top: 1px solid #ccc;
        }
        .btn { 
            padding: 10px 14px; border-radius: 6px; border: none; 
            font-weight: bold; cursor: pointer; color: #fff; 
            background: var(--accent-color); font-size: 14px;
            flex: 1; /* 按鈕自動平分空間 */
            min-width: 80px; max-width: 120px;
            text-align: center;
        }
        .btn-save { background: #e67e22; }
        .btn-gen { background: #27ae60; }
        .btn-preview { background: #34495e; }
        .btn-back { background: #7f8c8d; }
        .btn-pdf { background: #c0392b; }
        .btn-word { background: #2980b9; }

        .hidden { display: none !important; }

        /* 預覽模式下的輸入框處理 */
        body.preview-mode input, body.preview-mode textarea { border: none !important; background: transparent !important; padding: 2px !important; pointer-events: none; }
        body.preview-mode .no-print { display: none !important; }

        /* 手機列印優化 */
        @media print {
            .no-print { display: none !important; }
            .container { margin: 0; width: 100%; box-shadow: none; border: none; }
            body { background: white; }
        }
    </style>
</head>
<body>

    <div class="container" id="pdfArea">
        <div class="company-header">
            <input type="text" id="ipt_agency" placeholder="輸入旅行社名稱">
        </div>

        <h1>旅遊行程</h1>

        <div class="form-section">
            <div class="form-group"><label>客戶名稱：</label><input type="text" id="ipt_company"></div>
            <div class="form-group"><label>聯絡窗口：</label><input type="text" id="ipt_contact"></div>
            <div class="form-group"><label>聯絡電話：</label><input type="text" id="ipt_phone"></div>
            <div class="form-group"><label>出發日期：</label><input type="date" id="ipt_date"></div>
            <div class="form-group"><label>行程天數：</label><input type="number" id="ipt_days" value=""></div>
        </div>

        <table class="cost-table">
            <tr><th>個人團費</th><td><input type="text" id="ipt_c1" placeholder="$ /人"></td></tr>
            <tr><th>餐食交通</th><td><input type="text" id="ipt_c2" placeholder="車資、餐食說明"></td></tr>
            <tr><th>住宿安排</th><td><input type="text" id="ipt_c3" placeholder="飯店名稱與房型"></td></tr>
            <tr><th>費用包含</th><td><input type="text" id="ipt_c4" placeholder="保險、門票等"></td></tr>
            <tr><th>備註事項</th><td><input type="text" id="ipt_c5" placeholder="注意事項"></td></tr>
        </table>

        <div id="itineraryContainer">
            <p style="text-align: center; color: #999; padding: 30px;">請點擊下方「1. 生成行程表」</p>
        </div>
    </div>

    <!-- 工具列 -->
    <div class="toolbar no-print">
        <!-- 編輯模式按鈕 -->
        <div id="editTools" style="display: contents;">
            <button class="btn btn-save" onclick="saveData()">💾 存檔</button>
            <button class="btn" style="background:#8e44ad;" onclick="loadData()">📂 讀檔</button>
            <button class="btn btn-gen" onclick="buildItinerary()">1. 生成</button>
            <button class="btn btn-preview" onclick="toggleMode(true)">2. 預覽</button>
        </div>

        <!-- 預覽模式按鈕 -->
        <div id="downloadTools" class="hidden" style="display: contents;">
            <button class="btn btn-back" onclick="toggleMode(false)">⬅ 返回</button>
            <button class="btn btn-pdf" onclick="downloadPDF()">📥 PDF</button>
            <button class="btn btn-word" onclick="downloadWord()">📥 Word</button>
        </div>
    </div>

    <script>
        function autoHeight(el) { el.style.height = 'auto'; el.style.height = el.scrollHeight + 'px'; }
        document.addEventListener('input', e => { if(e.target.tagName === 'TEXTAREA') autoHeight(e.target); });

        function buildItinerary(existingData = null) {
            const days = existingData ? existingData.daysCount : document.getElementById('ipt_days').value;
            const start = document.getElementById('ipt_date').value;
            const container = document.getElementById('itineraryContainer');
            if (!days || days <= 0) return alert("請輸入有效天數");
            
            container.innerHTML = '';
            let d = start ? new Date(start) : null;
            for(let i=1; i<=days; i++) {
                let dateStr = d ? `${d.getMonth()+1}/${d.getDate()}` : `Day ${i}`;
                if(d) d.setDate(d.getDate()+1);
                
                let itemsHtml = '';
                if(existingData && existingData.days[i-1]) {
                    existingData.days[i-1].items.forEach(item => {
                        itemsHtml += createItemRow(item.time, item.content);
                    });
                } else {
                    itemsHtml = createItemRow("08:00", "");
                }
                const noteVal = (existingData && existingData.days[i-1]) ? existingData.days[i-1].note : "";

                const group = document.createElement('div');
                group.className = 'day-group';
                group.innerHTML = `
                    <div class="day-header">Day ${i} (${dateStr})</div>
                    <div class="items-list">${itemsHtml}</div>
                    <div class="add-act-wrapper no-print"><button class="btn-add" onclick="addAct(this)">+ 增加活動</button></div>
                    <div class="note-area"><span class="note-label">當日備註：</span><textarea class="ipt-note" rows="1">${noteVal}</textarea></div>`;
                container.appendChild(group);
            }
            document.querySelectorAll('textarea').forEach(t => autoHeight(t));
        }

        function createItemRow(time, content) {
            return `<div class="itinerary-item">
                <input type="text" class="ipt-time" value="${time}">
                <textarea placeholder="內容..." rows="1" oninput="autoHeight(this)">${content}</textarea>
                <button class="no-print" onclick="this.parentElement.remove()" style="border:none; background:none; color:red; font-size:20px;">×</button>
            </div>`;
        }

        function addAct(btn) {
            const list = btn.closest('.day-group').querySelector('.items-list');
            const div = document.createElement('div');
            div.innerHTML = createItemRow("", "");
            list.appendChild(div.firstElementChild);
        }

        // 預覽切換：確保 ID 選取正確
        function toggleMode(isPreview) {
            if (isPreview) {
                document.body.classList.add('preview-mode');
                document.getElementById('editTools').style.display = 'none';
                document.getElementById('downloadTools').classList.remove('hidden');
            } else {
                document.body.classList.remove('preview-mode');
                document.getElementById('editTools').style.display = 'contents';
                document.getElementById('downloadTools').classList.add('hidden');
            }
            document.querySelectorAll('input, textarea').forEach(el => el.readOnly = isPreview);
            window.scrollTo(0, 0);
        }

        function saveData() {
            const days = [];
            document.querySelectorAll('.day-group').forEach(group => {
                const items = [];
                group.querySelectorAll('.itinerary-item').forEach(it => {
                    items.push({ time: it.querySelector('.ipt-time').value, content: it.querySelector('textarea').value });
                });
                days.push({ items: items, note: group.querySelector('.ipt-note').value });
            });
            const data = {
                agency: document.getElementById('ipt_agency').value,
                company: document.getElementById('ipt_company').value,
                contact: document.getElementById('ipt_contact').value,
                phone: document.getElementById('ipt_phone').value,
                date: document.getElementById('ipt_date').value,
                daysCount: document.getElementById('ipt_days').value,
                costs: [1,2,3,4,5].map(i => document.getElementById('ipt_c'+i).value),
                days: days
            };
            localStorage.setItem('trip_data_v2', JSON.stringify(data));
            alert("✅ 已儲存至手機暫存");
        }

        function loadData() {
            const data = JSON.parse(localStorage.getItem('trip_data_v2'));
            if(!data) return alert("尚無存檔");
            document.getElementById('ipt_agency').value = data.agency || "";
            document.getElementById('ipt_company').value = data.company || "";
            document.getElementById('ipt_contact').value = data.contact || "";
            document.getElementById('ipt_phone').value = data.phone || "";
            document.getElementById('ipt_date').value = data.date || "";
            document.getElementById('ipt_days').value = data.daysCount || 3;
            data.costs.forEach((v, i) => document.getElementById('ipt_c'+(i+1)).value = v);
            buildItinerary(data);
            alert("📂 讀檔成功");
        }

        function downloadPDF() {
            const element = document.getElementById('pdfArea');
            const opt = {
                margin: 5,
                filename: '旅遊行程.pdf',
                image: { type: 'jpeg', quality: 0.98 },
                html2canvas: { scale: 2, useCORS: true, windowWidth: 794 },
                jsPDF: { unit: 'mm', format: 'a4', orientation: 'portrait' }
            };
            html2pdf().set(opt).from(element).save();
        }

        function downloadWord() {
            const area = document.getElementById('pdfArea').cloneNode(true);
            area.querySelectorAll('.no-print').forEach(n => n.remove());
            area.querySelectorAll('input, textarea').forEach(el => {
                const span = document.createElement('span');
                span.innerHTML = el.value.replace(/\n/g, '<br>');
                el.replaceWith(span);
            });
            const html = `<html><head><meta charset="utf-8"></head><body>${area.innerHTML}</body></html>`;
            const converted = htmlDocx.asBlob(html);
            saveAs(converted, '旅遊行程.docx');
        }
    </script>
</body>
</html>
