<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>旅遊行程</title>
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/FileSaver.js/2.0.5/FileSaver.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>

    <style>
        * { box-sizing: border-box; -webkit-print-color-adjust: exact; print-color-adjust: exact; }

        :root {
            --primary-color: #2c3e50;
            --accent-color: #2980b9;
            --bg-color: #f0f2f5;
            --paper-color: #ffffff;
            --input-height: 42px;
        }

        body {
            font-family: "Microsoft JhengHei", "Heiti TC", sans-serif;
            background-color: var(--bg-color);
            margin: 0; padding: 0;
            display: flex; flex-direction: column; align-items: center;
            min-height: 100vh;
        }

        body.preview-mode { background-color: #444 !important; }

        /* --- 現代化通知 (Toast) 樣式 --- */
        .toast-container {
            position: fixed;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 1000000;
            pointer-events: none;
        }
        .toast-msg {
            background: rgba(0, 0, 0, 0.75);
            backdrop-filter: blur(8px);
            color: white;
            padding: 12px 25px;
            border-radius: 50px;
            font-size: 14px;
            font-weight: bold;
            margin-bottom: 10px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
            opacity: 0;
            transform: translateY(-20px);
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            display: flex;
            align-items: center;
            white-space: nowrap;
        }
        .toast-msg.show {
            opacity: 1;
            transform: translateY(0);
        }

        .container {
            width: 95%;
            max-width: 210mm;
            min-height: 297mm;
            background: var(--paper-color);
            padding: 40px;
            margin: 20px auto 160px auto; 
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            position: relative;
        }

        .company-header input {
            font-size: 24pt; font-weight: bold; text-align: center; border: none;
            border-bottom: 2px solid #eee; width: 100%; color: var(--primary-color);
            background: transparent; margin-bottom: 10px;
            height: 60px;
        }
        h1 { text-align: center; border-bottom: 3px double #000; padding-bottom: 10px; font-size: 26pt; margin: 10px 0 25px 0; }

        input, textarea {
            padding: 8px 12px;
            border: 1px solid #ddd;
            border-radius: 8px;
            font-size: 11pt;
            background: #fafafa;
            font-family: inherit;
        }

        .form-section { 
            display: grid; 
            grid-template-columns: repeat(auto-fit, minmax(320px, 1fr)); 
            gap: 12px 25px; 
            margin-bottom: 30px; 
        }
        .form-group { 
            display: flex; 
            align-items: center; 
            border-bottom: 1px solid #eee; 
            padding: 8px 0; 
        }
        label { 
            font-size: 11pt; 
            font-weight: bold; 
            width: 90px; 
            flex-shrink: 0; 
            color: #333; 
        }
        .form-group input { 
            flex-grow: 1;
            height: var(--input-height);
        }
        
        .cost-table { width: 100%; border-collapse: collapse; margin-bottom: 40px; background: #fff; }
        .cost-table th, .cost-table td { border: 1px solid #000; padding: 0 10px; font-size: 11pt; }
        .cost-table th { background-color: #f8f9fa; width: 120px; text-align: center; height: 50px; }
        .cost-table td input { width: 100%; border: none; background: transparent; height: var(--input-height); }

        #itineraryContainer {
            page-break-before: always;
            padding-top: 20px;
        }

        .day-group { margin-bottom: 30px; border: 1.5px solid #444; border-radius: 8px; overflow: hidden; background: #fff; page-break-inside: avoid; }
        .day-header { background: var(--primary-color); color: #fff; padding: 15px; font-weight: bold; font-size: 16px; }
        .items-list { padding: 15px; }
        
        .itinerary-item { 
            display: flex; 
            gap: 12px; 
            margin-bottom: 15px; 
            align-items: flex-start; 
            border-bottom: 1px dotted #ccc; 
            padding-bottom: 10px; 
        }
        .ipt-time { 
            width: 80px; 
            flex-shrink: 0; 
            text-align: center; 
            font-weight: bold; 
            height: var(--input-height);
        }
        .itinerary-item textarea { 
            flex-grow: 1; 
            resize: none; 
            min-height: var(--input-height);
            line-height: 1.6;
        }
        
        .add-act-wrapper { text-align: center; padding: 15px; background: #f9f9f9; border-top: 1px dashed #ccc; }
        .btn-add { background: #5da5da; color: white; border: none; padding: 12px 30px; border-radius: 25px; cursor: pointer; font-weight: bold; font-size: 14px; }

        .note-area { padding: 12px 15px; background: #fffbe6; border-top: 1px solid #ddd; }
        .note-label { font-weight: bold; color: #856404; font-size: 11pt; display: block; margin-bottom: 5px; }
        .ipt-note { 
            width: 100%; 
            min-height: 40px; 
            line-height: 1.6; 
            resize: vertical; 
            overflow: hidden;
            background: #fffef0;
        }

        .toolbar-fixed {
            position: fixed; bottom: 0; left: 0; width: 100%; background: #ffffff;
            z-index: 99999; box-shadow: 0 -5px 25px rgba(0,0,0,0.3);
            padding: 15px 15px calc(15px + env(safe-area-inset-bottom)); 
            display: flex; justify-content: center;
        }
        .btn-group { display: flex; gap: 8px; width: 100%; max-width: 900px; }
        .btn { 
            flex: 1; padding: 14px 5px; border-radius: 10px; border: none; 
            font-weight: bold; color: #fff; font-size: 14px; cursor: pointer; transition: 0.2s;
        }
        .btn-edit-save { background: #e67e22; }
        .btn-edit-load { background: #8e44ad; }
        .btn-edit-gen { background: #27ae60; }
        .btn-edit-preview { background: #34495e; }
        .btn-pre-back { background: #7f8c8d; }
        .btn-pre-pdf { background: #c0392b; }
        .btn-pre-word { background: #2980b9; }

        .hidden { display: none !important; }

        body.preview-mode .ipt-time,
        body.preview-mode .itinerary-item textarea,
        body.preview-mode .ipt-note,
        body.preview-mode .form-group input,
        body.preview-mode .cost-table td input { border: none !important; background: transparent !important; padding-left: 0; padding-right: 0; }
        body.preview-mode .btn-add, body.preview-mode .add-act-wrapper, body.preview-mode .item-del-btn { display: none !important; }
        body.preview-mode input, body.preview-mode textarea { pointer-events: none; }

        @media (max-width: 600px) {
            .container { padding: 15px; margin: 0 auto 120px auto; width: 100%; box-shadow: none; }
            h1 { font-size: 20pt; }
            .form-section { grid-template-columns: 1fr; } 
            .form-group { flex-direction: row; align-items: center; border-bottom: 1px solid #f0f0f0; }
            label { width: 85px; font-size: 10.5pt; }
            .ipt-time { width: 70px; }
        }

        @media print { .no-print { display: none !important; } }

        .pdf-render-fix {
            width: 800px !important;
            min-width: 800px !important;
            max-width: 800px !important;
            margin: 0 !important;
            padding: 40px !important;
            box-shadow: none !important;
            background: white !important;
            display: block !important;
        }
        .pdf-render-fix .form-section { grid-template-columns: 1fr 1fr !important; display: grid !important; }
        .pdf-render-fix .form-group { flex-direction: row !important; }
        .pdf-render-fix .itinerary-item textarea { width: 600px !important; flex: none !important; }
        .pdf-render-fix .cost-table { width: 100% !important; display: table !important; }
    </style>
</head>
<body>

    <!-- 通知容器 -->
    <div class="toast-container" id="toastContainer"></div>

    <div class="container" id="pdfArea">
        <div class="company-header">
            <input type="text" id="ipt_agency" placeholder="輸入旅行社名稱">
        </div>
        <h1>旅遊行程</h1>
        
        <div class="form-section">
            <div class="form-group"><label>客戶名稱：</label><input type="text" id="ipt_company"></div>
            <div class="form-group"><label>聯絡窗口：</label><input type="text" id="ipt_contact"></div>
            <div class="form-group"><label>聯絡電話：</label><input type="text" id="ipt_phone"></div>
            <div class="form-group"><label>出發日期：</label><input type="date" id="ipt_date"></div>
            <div class="form-group"><label>行程天數：</label><input type="number" id="ipt_days" value="3"></div>
        </div>

        <table class="cost-table">
            <tr><th>個人團費</th><td><input type="text" id="ipt_c1" placeholder="$ /人"></td></tr>
            <tr><th>車資</th><td><input type="text" id="ipt_c2" placeholder="車資說明"></td></tr>
            <tr><th>餐食</th><td><input type="text" id="ipt_c3" placeholder="早午晚餐說明"></td></tr>
            <tr><th>住宿</th><td><input type="text" id="ipt_c4" placeholder="飯店名稱與房型"></td></tr>
            <tr><th>費用包含</th><td><input type="text" id="ipt_c5" placeholder="門票保險等"></td></tr>
            <tr><th>備註事項</th><td><input type="text" id="ipt_c6" placeholder="集合時間地點"></td></tr>
        </table>

        <div id="itineraryContainer">
            <p style="text-align: center; color: #999; padding: 50px;" class="no-print">請點擊下方「1. 生成」</p>
        </div>
    </div>

    <div class="toolbar-fixed no-print">
        <div id="group-edit" class="btn-group">
            <button class="btn btn-edit-save" onclick="saveData()">💾存檔</button>
            <button class="btn btn-edit-load" onclick="loadData()">📂讀檔</button>
            <button class="btn btn-edit-gen" onclick="buildItinerary()">1.生成</button>
            <button class="btn btn-edit-preview" onclick="toggleMode(true)">2.預覽</button>
        </div>
        <div id="group-preview" class="btn-group hidden">
            <button class="btn btn-pre-back" onclick="toggleMode(false)">⬅返回編輯</button>
            <button class="btn btn-pre-pdf" onclick="downloadPDF()">📥下載PDF</button>
            <button class="btn btn-pre-word" onclick="downloadWord()">📥下載Docs</button>
        </div>
    </div>

    <script>
        // --- 現代化通知邏輯 ---
        function showToast(message) {
            const container = document.getElementById('toastContainer');
            const toast = document.createElement('div');
            toast.className = 'toast-msg';
            toast.innerHTML = message;
            container.appendChild(toast);

            // 觸發進場動畫
            setTimeout(() => toast.classList.add('show'), 100);

            // 2.5秒後自動消失
            setTimeout(() => {
                toast.classList.remove('show');
                setTimeout(() => toast.remove(), 400);
            }, 2500);
        }

        function autoHeight(el) {
            el.style.height = 'auto';
            el.style.height = el.scrollHeight + 'px';
            const minH = 40;
            if(el.classList.contains('ipt-note') && el.scrollHeight < minH) {
                el.style.height = minH + 'px';
            }
        }

        document.addEventListener('input', function(e) {
            if (e.target.classList.contains('ipt-time')) {
                let val = e.target.value.replace(/\D/g, '');
                if (val.length >= 3) {
                    e.target.value = val.slice(0, 2) + ':' + val.slice(2, 4);
                }
            }
        });

        function buildItinerary(existingData = null) {
            const days = existingData ? existingData.daysCount : document.getElementById('ipt_days').value;
            const start = document.getElementById('ipt_date').value;
            const container = document.getElementById('itineraryContainer');
            if (!days || days <= 0) return alert("請輸入有效天數");
            
            container.innerHTML = '';
            let d = start ? new Date(start) : null;
            for(let i=1; i<=days; i++) {
                let dateStr = d ? `${d.getMonth()+1}/${d.getDate()}` : `Day ${i}`;
                if(d) d.setDate(d.getDate()+1);
                
                let itemsHtml = (existingData && existingData.days[i-1]) 
                    ? existingData.days[i-1].items.map(item => createItemRow(item.time, item.content)).join('')
                    : createItemRow("", "");
                
                const noteVal = (existingData && existingData.days[i-1]) ? existingData.days[i-1].note : "";
                const group = document.createElement('div');
                group.className = 'day-group';
                group.innerHTML = `
                    <div class="day-header">Day ${i} (${dateStr})</div>
                    <div class="items-list">${itemsHtml}</div>
                    <div class="add-act-wrapper"><button class="btn-add" onclick="addAct(this)">+ 增加項目</button></div>
                    <div class="note-area"><span class="note-label">當日備註：</span><textarea class="ipt-note" oninput="autoHeight(this)">${noteVal}</textarea></div>`;
                container.appendChild(group);
            }
            document.querySelectorAll('textarea').forEach(t => autoHeight(t));
        }

        function createItemRow(time, content) {
            return `<div class="itinerary-item">
                <input type="text" class="ipt-time" value="${time}" placeholder="00:00" maxlength="5">
                <textarea placeholder="內容描述..." rows="1" oninput="autoHeight(this)">${content}</textarea>
                <button class="item-del-btn no-print" onclick="this.parentElement.remove()" style="border:none; background:none; color:#e74c3c; font-weight:bold; cursor:pointer; font-size:24px; padding:0 5px;">×</button>
            </div>`;
        }

        function addAct(btn) {
            const list = btn.closest('.day-group').querySelector('.items-list');
            const div = document.createElement('div');
            div.innerHTML = createItemRow("", "");
            list.appendChild(div.firstElementChild);
        }

        function toggleMode(isPreview) {
            document.body.classList.toggle('preview-mode', isPreview);
            document.getElementById('group-edit').classList.toggle('hidden', isPreview);
            document.getElementById('group-preview').classList.toggle('hidden', !isPreview);
            
            document.querySelectorAll('.day-group').forEach(group => {
                const noteInput = group.querySelector('.ipt-note');
                const noteArea = group.querySelector('.note-area');
                if (isPreview && noteInput.value.trim() === "") {
                    noteArea.style.display = 'none';
                } else {
                    noteArea.style.display = 'block';
                }
            });

            document.querySelectorAll('input, textarea').forEach(el => el.readOnly = isPreview);
            window.scrollTo(0, 0);
            if(isPreview) { document.querySelectorAll('textarea').forEach(t => autoHeight(t)); }
        }

        function saveData() {
            const days = [];
            document.querySelectorAll('.day-group').forEach(group => {
                const items = [];
                group.querySelectorAll('.itinerary-item').forEach(it => {
                    items.push({ time: it.querySelector('.ipt-time').value, content: it.querySelector('textarea').value });
                });
                days.push({ items: items, note: group.querySelector('.ipt-note').value });
            });
            const data = {
                agency: document.getElementById('ipt_agency').value,
                company: document.getElementById('ipt_company').value,
                contact: document.getElementById('ipt_contact').value,
                phone: document.getElementById('ipt_phone').value,
                date: document.getElementById('ipt_date').value,
                daysCount: document.getElementById('ipt_days').value,
                costs: [1,2,3,4,5,6].map(i => document.getElementById('ipt_c'+i).value),
                days: days
            };
            localStorage.setItem('trip_v3_data', JSON.stringify(data));
            // 修改：使用現代化通知
            showToast("✅ 存檔成功，資料已儲存於瀏覽器");
        }

        function loadData() {
            const data = JSON.parse(localStorage.getItem('trip_v3_data'));
            if(!data) return alert("無紀錄");
            document.getElementById('ipt_agency').value = data.agency || "";
            document.getElementById('ipt_company').value = data.company || "";
            document.getElementById('ipt_contact').value = data.contact || "";
            document.getElementById('ipt_phone').value = data.phone || "";
            document.getElementById('ipt_date').value = data.date || "";
            document.getElementById('ipt_days').value = data.daysCount || 3;
            data.costs.forEach((v, i) => { if(document.getElementById('ipt_c'+(i+1))) document.getElementById('ipt_c'+(i+1)).value = v; });
            buildItinerary(data);
            // 修改：使用現代化通知
            showToast("📂 讀檔成功，已恢復上次存檔內容");
        }

        function downloadPDF() {
            const element = document.getElementById('pdfArea');
            const originalScrollY = window.scrollY;
            window.scrollTo(0, 0);
            element.classList.add('pdf-render-fix');

            setTimeout(() => {
                const opt = {
                    margin: 0, 
                    filename: '旅遊行程表.pdf',
                    image: { type: 'jpeg', quality: 0.98 },
                    html2canvas: { 
                        scale: 2, 
                        useCORS: true, 
                        windowWidth: 800,
                        width: 800,
                        scrollX: 0, scrollY: 0, x: 0, y: 0
                    },
                    pagebreak: { mode: ['css', 'legacy'] }, 
                    jsPDF: { unit: 'pt', format: 'a4', orientation: 'portrait' }
                };

                html2pdf().set(opt).from(element).save().then(() => {
                    element.classList.remove('pdf-render-fix');
                    window.scrollTo(0, originalScrollY);
                }).catch(err => {
                    element.classList.remove('pdf-render-fix');
                });
            }, 100);
        }

        function downloadWord() {
            const agency = document.getElementById('ipt_agency').value;
            const company = document.getElementById('ipt_company').value;
            const contact = document.getElementById('ipt_contact').value;
            const phone = document.getElementById('ipt_phone').value;
            const date = document.getElementById('ipt_date').value;
            const daysCount = document.getElementById('ipt_days').value;

            let htmlString = `
                <div style="width: 100%; font-family: 'Microsoft JhengHei', sans-serif;">
                    <p style="text-align: center; font-size: 20pt; font-weight: bold; color: #2c3e50; margin-bottom: 5pt;">${agency}</p>
                    <p style="text-align: center; font-size: 26pt; font-weight: bold; border-bottom: 2pt double black; padding-bottom: 10pt; margin-top: 0;">旅遊行程表</p>
                    <table style="width: 100%; border-collapse: collapse; margin-bottom: 20pt;">
                        <tr><td style="width: 15%; font-weight: bold; padding: 8pt 0;">客戶名稱：</td><td style="width: 35%; border-bottom: 1pt solid #ccc;">${company}</td><td style="width: 15%; font-weight: bold; padding: 8pt 0; padding-left: 20pt;">聯絡窗口：</td><td style="width: 35%; border-bottom: 1pt solid #ccc;">${contact}</td></tr>
                        <tr><td style="font-weight: bold; padding: 8pt 0;">聯絡電話：</td><td style="border-bottom: 1pt solid #ccc;">${phone}</td><td style="font-weight: bold; padding: 8pt 0; padding-left: 20pt;">出發日期：</td><td style="border-bottom: 1pt solid #ccc;">${date}</td></tr>
                        <tr><td style="font-weight: bold; padding: 8pt 0;">行程天數：</td><td style="border-bottom: 1pt solid #ccc;">${daysCount} 天</td><td></td><td></td></tr>
                    </table>
                    <p style="font-size: 14pt; font-weight: bold; color: #2c3e50; margin-bottom: 10pt;">■ 費用明細</p>
                    <table style="width: 100%; border-collapse: collapse; margin-bottom: 20pt; border: 1pt solid black;">
            `;

            const costLabels = ["個人團費", "車資", "餐食", "住宿", "費用包含", "備註事項"];
            for (let i = 1; i <= 6; i++) {
                const val = document.getElementById('ipt_c' + i).value;
                htmlString += `<tr><td style="width: 20%; background-color: #f8f9fa; border: 1pt solid black; padding: 10pt; font-weight: bold; text-align: center;">${costLabels[i - 1]}</td><td style="width: 80%; border: 1pt solid black; padding: 10pt;">${val.replace(/\n/g, '<br>')}</td></tr>`;
            }
            htmlString += `</table><br clear="all" style="page-break-before: always;"><p style="font-size: 14pt; font-weight: bold; color: #2c3e50; margin-bottom: 10pt;">■ 詳細行程規劃</p>`;
            
            document.querySelectorAll('.day-group').forEach((group) => {
                const head = group.querySelector('.day-header').innerText;
                const note = group.querySelector('.ipt-note').value;
                htmlString += `<table style="width: 100%; border-collapse: collapse; margin-bottom: 25pt; border: 1.5pt solid #2c3e50;"><tr style="background-color: #2c3e50;"><td colspan="2" style="padding: 10pt; color: #ffffff; font-weight: bold; font-size: 12pt;">${head}</td></tr>`;
                group.querySelectorAll('.itinerary-item').forEach(it => {
                    const time = it.querySelector('.ipt-time').value;
                    const content = it.querySelector('textarea').value.replace(/\n/g, '<br>');
                    htmlString += `<tr><td style="width: 80pt; border: 0.5pt solid #eee; padding: 10pt; text-align: center; font-weight: bold; vertical-align: top; background-color: #fcfcfc;">${time}</td><td style="border: 0.5pt solid #eee; padding: 10pt; vertical-align: top; line-height: 1.6;">${content}</td></tr>`;
                });

                if (note.trim() !== "") {
                    htmlString += `<tr><td colspan="2" style="background-color: #fffbe6; padding: 10pt; border-top: 1pt solid #ddd;"><span style="color: #d35400; font-weight: bold;">當日備註：</span><br><span style="color: #555;">${note.replace(/\n/g, '<br>')}</span></td></tr>`;
                }
                htmlString += `</table>`;
            });

            const header = `<html xmlns:o='urn:schemas-microsoft-com:office:office' xmlns:w='urn:schemas-microsoft-com:office:word' xmlns='http://www.w3.org/TR/REC-html40'><head><meta charset="utf-8"><style>body { font-family: "Microsoft JhengHei"; } table { border-spacing: 0; }</style></head><body>${htmlString}</body></html>`;
            const blob = new Blob([header], { type: 'application/msword' });
            saveAs(blob, '旅遊行程表_' + company + '.doc');
        }
    </script>
</body>
</html>
