<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>MyTrip 旅遊行程</title>
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/FileSaver.js/2.0.5/FileSaver.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>

    <style>
        * { box-sizing: border-box; -webkit-print-color-adjust: exact; print-color-adjust: exact; }
        :root { --primary-color: #2c3e50; --accent-color: #2980b9; --bg-color: #f0f2f5; --paper-color: #ffffff; --input-height: 42px; }
        body { font-family: "Microsoft JhengHei", "Heiti TC", sans-serif; background-color: var(--bg-color); margin: 0; padding: 0; display: flex; flex-direction: column; align-items: center; min-height: 100vh; }
        body.preview-mode { background-color: #444 !important; }

        /* 導覽列 */
        .lang-switch { position: relative; width: 95%; max-width: 210mm; margin: 0 auto; padding: 20px 0; display: flex; justify-content: space-between; align-items: center; z-index: 100; background-color: #fbfafa; }
        .brand-logo { font-size: 24px; font-weight: 900; color: var(--primary-color); font-family: 'Arial', sans-serif; letter-spacing: 1px; cursor: default; display: flex; align-items: center; gap: 8px; }
        .lang-switch select { padding: 8px 15px; border-radius: 20px; border: 1px solid #ccc; font-size: 14px; background: white; cursor: pointer; box-shadow: 0 2px 5px rgba(0,0,0,0.05); transition: 0.2s; }

        .toast-container { position: fixed; top: 20px; left: 50%; transform: translateX(-50%); z-index: 1000000; pointer-events: none; }
        .toast-msg { background: rgba(0, 0, 0, 0.75); backdrop-filter: blur(8px); color: white; padding: 12px 25px; border-radius: 50px; font-size: 14px; font-weight: bold; margin-bottom: 10px; opacity: 0; transform: translateY(-20px); transition: all 0.4s; }
        .toast-msg.show { opacity: 1; transform: translateY(0); }
        
        .container { width: 95%; max-width: 210mm; min-height: 297mm; background: var(--paper-color); padding: 40px; margin: 0 auto 160px auto; box-shadow: 0 4px 20px rgba(0,0,0,0.08); position: relative; }
        .company-header input { font-size: 24pt; font-weight: bold; text-align: center; border: none; border-bottom: 2px solid #eee; width: 100%; color: var(--primary-color); background: transparent; margin-bottom: 10px; height: 60px; }
        h1 { text-align: center; border-bottom: 3px double #000; padding-bottom: 10px; font-size: 26pt; margin: 10px 0 25px 0; }
        
        /* 表單區 */
        .form-section { display: grid; grid-template-columns: repeat(auto-fit, minmax(320px, 1fr)); gap: 12px 25px; margin-bottom: 30px; }
        .form-group { display: flex; align-items: center; border-bottom: 1px solid #eee; padding: 8px 0; }
        label { font-size: 11pt; font-weight: bold; width: 110px; flex-shrink: 0; color: #333; }
        input, textarea { padding: 8px 12px; border: 1px solid #ddd; border-radius: 8px; font-size: 11pt; background: #fafafa; font-family: inherit; }
        .form-group input { flex-grow: 1; height: var(--input-height); }
        
        .cost-table { width: 100%; border-collapse: collapse; margin-bottom: 40px; background: #fff; }
        .cost-table th, .cost-table td { border: 1px solid #000; padding: 0 10px; font-size: 11pt; }
        .cost-table th { background-color: #f8f9fa; width: 140px; text-align: center; height: 50px; }
        .cost-table td input { width: 100%; border: none; background: transparent; height: var(--input-height); }
        
        #itineraryContainer { page-break-before: always; padding-top: 20px; }
        .day-group { margin-bottom: 30px; border: 1.5px solid #444; border-radius: 8px; overflow: hidden; background: #fff; }
        .day-header { background: var(--primary-color); color: #fff; padding: 15px; font-weight: bold; font-size: 16px; }
        .items-list { padding: 10px 15px; }

        /* Flex Row 結構 */
        .itinerary-item { 
            display: flex; 
            align-items: flex-start; 
            margin-bottom: 10px; 
            border-bottom: 1px dotted #ccc; 
            padding-bottom: 10px; 
            position: relative;
        }

        .time-col {
            width: 90px;
            flex-shrink: 0;
            display: flex;
            align-items: flex-start;
            padding-right: 10px;
            border-right: 1px dashed #eee;
            margin-right: 10px;
        }
        .ipt-time { width: 100%; text-align: center; font-weight: bold; height: var(--input-height); }

        .content-col {
            flex-grow: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
            min-width: 0;
        }
        .item-content { 
            width: 100%; resize: none; min-height: var(--input-height); 
            line-height: 1.6; margin-bottom: 5px;
        }

        .btn-del-item {
            position: absolute; right: 0; top: 0;
            border: none; background: none; color: #e74c3c; 
            font-weight: bold; cursor: pointer; font-size: 24px; 
            padding: 0 5px; z-index: 10;
        }

        /* 功能區 */
        .tools-area { margin-top: 5px; }
        
        .smart-suggestion-area { display: flex; gap: 8px; flex-wrap: wrap; align-items: center; min-height: 0; margin-bottom: 5px; }
        .suggestion-btn { background: #eef6fc; color: #2980b9; border: 1px solid #b3d4fc; padding: 4px 12px; border-radius: 20px; font-size: 12px; cursor: pointer; display: flex; align-items: center; gap: 5px; transition: 0.2s; white-space: nowrap; }
        .suggestion-btn:hover { background: #d0e7fc; transform: translateY(-1px); }

        .link-input-container { display: none; gap: 5px; align-items: center; animation: fadeIn 0.3s; margin-bottom: 5px; }
        .ipt-paste-link { flex: 1; height: 32px; font-size: 12px; border: 1px dashed #2980b9; background: #fcfcfc; }
        .btn-save-link { height: 32px; background: #27ae60; color: white; border: none; padding: 0 15px; border-radius: 4px; cursor: pointer; font-size: 12px; white-space: nowrap; }

        .confirmed-link-badge { 
            display: none; align-items: center; gap: 8px; 
            background: #e8f8f5; border: 1px solid #2ecc71; 
            padding: 4px 10px; border-radius: 4px; width: fit-content; 
            margin-top: 2px;
        }
        .badge-text { font-size: 12px; color: #27ae60; font-weight: bold; }
        .badge-url { font-size: 11px; color: #7f8c8d; text-decoration: underline; max-width: 250px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
        .btn-del-link { background: none; border: none; color: #c0392b; cursor: pointer; font-weight: bold; margin-left: 5px; }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(-5px); } to { opacity: 1; transform: translateY(0); } }
        .card-editor { display: none; } 

        .add-act-wrapper { text-align: center; padding: 15px; background: #f9f9f9; border-top: 1px dashed #ccc; }
        .btn-add { background: #5da5da; color: white; border: none; padding: 12px 30px; border-radius: 25px; cursor: pointer; font-weight: bold; font-size: 14px; }
        .note-area { padding: 12px 15px; background: #fffbe6; border-top: 1px solid #ddd; }
        .note-label { font-weight: bold; color: #856404; font-size: 11pt; display: block; margin-bottom: 5px; }
        .ipt-note { width: 100%; min-height: 40px; line-height: 1.6; resize: vertical; overflow: hidden; background: #fffef0; }

        /* 懸浮按鈕 FAB */
        .fab-container { position: fixed; bottom: calc(20px + env(safe-area-inset-bottom)); right: 20px; z-index: 99999; display: flex; flex-direction: column; align-items: flex-end; gap: 10px; user-select: none; }
        .fab-main { width: 58px; height: 58px; border-radius: 50%; border: none; color: #fff; font-size: 26px; cursor: pointer; box-shadow: 0 4px 16px rgba(0,0,0,0.3); display: flex; align-items: center; justify-content: center; transition: transform 0.2s, box-shadow 0.2s; background: #2c3e50; flex-shrink: 0; }
        .fab-main:active { transform: scale(0.92); }
        .fab-menu { display: flex; flex-direction: column; align-items: flex-end; gap: 10px; transition: opacity 0.25s, transform 0.25s; }
        .fab-menu.collapsed { opacity: 0; pointer-events: none; transform: translateY(10px); }
        .fab-row { display: flex; align-items: center; gap: 10px; }
        .fab-label { background: rgba(30,30,30,0.82); color: #fff; font-size: 13px; font-weight: bold; padding: 6px 13px; border-radius: 20px; white-space: nowrap; box-shadow: 0 2px 8px rgba(0,0,0,0.18); pointer-events: none; }
        .btn { width: 50px; height: 50px; border-radius: 50%; border: none; font-weight: bold; color: #fff; font-size: 20px; cursor: pointer; box-shadow: 0 3px 10px rgba(0,0,0,0.25); display: flex; align-items: center; justify-content: center; transition: transform 0.15s; flex-shrink: 0; }
        .btn:active { transform: scale(0.9); }
        .btn-edit-save { background: #e67e22; }
        .btn-edit-load { background: #8e44ad; }
        .btn-edit-gen { background: #27ae60; }
        .btn-edit-preview { background: #34495e; }
        .btn-pre-back { background: #7f8c8d; }
        .btn-pre-pdf { background: #c0392b; }
        .btn-pre-word { background: #2980b9; }
        .hidden { display: none !important; }

        body.preview-mode .ipt-time, body.preview-mode .item-content, body.preview-mode .form-group input, body.preview-mode .cost-table td input { border: none !important; background: transparent !important; padding-left: 0; padding-right: 0; }
        body.preview-mode .form-group { border-bottom: 1px solid #eee !important; }
        body.preview-mode .btn-add, body.preview-mode .add-act-wrapper, body.preview-mode .btn-del-item, body.preview-mode .card-editor, body.preview-mode .tools-area { display: none !important; }
        body.preview-mode input, body.preview-mode textarea { pointer-events: none; }
        body.preview-mode .confirmed-link-badge { display: inline-flex; pointer-events: auto; }
        
        /* PDF 專用排版 */
        .pdf-render-fix { width: 800px !important; min-width: 800px !important; max-width: 800px !important; margin: 0 !important; padding: 40px !important; box-shadow: none !important; background: white !important; display: block !important; }
        .pdf-render-fix .form-section { grid-template-columns: 1fr 1fr !important; display: grid !important; gap: 8px 20px !important; margin-bottom: 25px !important; }
        .pdf-render-fix .form-group { flex-direction: row !important; border-bottom: 1px solid #eee !important; padding: 6px 0 !important; }
        .pdf-render-fix .form-group input { border: none !important; background: transparent !important; padding-left: 0 !important; height: auto !important; font-size: 11pt !important; }
        .pdf-render-fix label { font-size: 10pt !important; width: 90px !important; }
        
        .pdf-render-fix .cost-table { margin-top: 20px !important; page-break-inside: avoid; }
        .pdf-render-fix .cost-table th { font-size: 10pt !important; padding: 6px 10px !important; }
        .pdf-render-fix .cost-table td input { font-size: 10pt !important; }
        .pdf-render-fix .day-group { margin-bottom: 15px !important; border: 1px solid #444 !important; }
        
        .pdf-render-fix .itinerary-item {
            display: flex !important;
            align-items: center !important;
            border-bottom: 1px solid #ddd !important;
            padding: 4px 0 !important;
            margin: 0 !important;
            min-height: 32px !important;
            page-break-inside: avoid;
        }
        
        .pdf-render-fix .time-col {
            border-right: 1px solid #ccc !important;
            padding-right: 15px !important;
            margin-right: 15px !important;
            width: 80px !important;
            justify-content: center !important;
            height: 100% !important;
        }
        
        .pdf-render-fix .content-col {
            display: flex !important;
            flex-direction: column !important;
            justify-content: center !important; 
        }

        .pdf-render-fix textarea { 
            width: 100% !important; 
            line-height: 1.3 !important; 
            padding: 0 !important; 
            margin: 0 !important;
            height: auto !important;
        }
        
        .pdf-render-fix .ipt-time { padding: 0 !important; height: auto !important; font-size: 12pt !important; }

        .pdf-render-fix .tools-area, .pdf-render-fix .btn-del-item, .pdf-render-fix .card-editor { display: none !important; }
        
        .pdf-render-fix .confirmed-link-badge {
            background: transparent !important; border: none !important;
            padding: 0 !important; 
            margin-top: 1px !important;
            display: block !important;
        }
        .pdf-render-fix .badge-text { display: none !important; } 
        .pdf-render-fix .badge-url { 
            color: #003580 !important; text-decoration: underline !important; 
            max-width: none !important; white-space: normal !important; overflow: visible !important;
            font-size: 9pt !important;
            line-height: 1.1 !important;
        }
        .pdf-render-fix .btn-del-link { display: none !important; }
        
        @media (max-width: 600px) { 
            .container { padding: 15px; width: 100%; box-shadow: none; }
            .form-section { grid-template-columns: 1fr; } 
            .lang-switch { width: 100%; padding: 10px 15px; }
        }
        @media print { .no-print { display: none !important; } }
    </style>
</head>
<body>

    <div class="lang-switch no-print">
        <div class="brand-logo">My Trips</div>
        <select id="langSelect" onchange="changeLang()">
            <option value="zh-TW">繁體中文</option>
            <option value="en">English</option>
        </select>
    </div>

    <div class="toast-container" id="toastContainer"></div>

    <div class="container" id="pdfArea">
        <div class="company-header"><input type="text" id="ipt_agency" data-ph="ph_agency" placeholder="輸入旅行社名稱"></div>
        <h1 data-i18n="title">旅遊行程</h1>
        
        <div class="form-section">
            <div class="form-group"><label data-i18n="client">客戶名稱：</label><input type="text" id="ipt_company"></div>
            <div class="form-group"><label data-i18n="contact">聯絡窗口：</label><input type="text" id="ipt_contact"></div>
            <div class="form-group"><label data-i18n="phone">聯絡電話：</label><input type="text" id="ipt_phone"></div>
            <div class="form-group"><label data-i18n="date">出發日期：</label><input type="date" id="ipt_date"></div>
            <div class="form-group"><label data-i18n="days">行程天數：</label><input type="number" id="ipt_days" value="3"></div>
            <div class="form-group"><label data-i18n="meetup">集合地點：</label><input type="text" id="ipt_meetup"></div>
        </div>

        <div id="itineraryContainer">
            <p style="text-align: center; color: #999; padding: 50px;" class="no-print" data-i18n="click_hint">請點擊「1. 行程」</p>
        </div>

        <table class="cost-table" style="margin-top: 40px;">
            <tr><th data-i18n="c1_label">個人團費</th><td><input type="text" id="ipt_c1" data-ph="c1_ph" placeholder="$ /人"></td></tr>
            <tr><th data-i18n="c2_label">交通</th><td><input type="text" id="ipt_c2" data-ph="c2_ph" placeholder="交通說明: 車資/機票"></td></tr>
            <tr><th data-i18n="c3_label">餐食</th><td><input type="text" id="ipt_c3" data-ph="c3_ph" placeholder="早午晚餐說明"></td></tr>
            <tr><th data-i18n="c4_label">住宿</th><td><input type="text" id="ipt_c4" data-ph="c4_ph" placeholder="飯店名稱與房型"></td></tr>
            <tr><th data-i18n="c5_label">費用包含</th><td><input type="text" id="ipt_c5" data-ph="c5_ph" placeholder="門票保險等"></td></tr>
        </table>
    </div>

    <!-- 懸浮按鈕 -->
    <div class="fab-container no-print" id="fabContainer">
        <!-- 編輯模式選單 -->
        <div id="group-edit" class="fab-menu">
            <div class="fab-row"><span class="fab-label" data-i18n="btn_view">2.預覽</span><button class="btn btn-edit-preview" onclick="toggleMode(true)">👁️</button></div>
            <div class="fab-row"><span class="fab-label" data-i18n="btn_gen">1.行程</span><button class="btn btn-edit-gen" onclick="buildItinerary()">📝</button></div>
            <div class="fab-row"><span class="fab-label" data-i18n="btn_load">讀檔</span><button class="btn btn-edit-load" onclick="loadData()">📂</button></div>
            <div class="fab-row"><span class="fab-label" data-i18n="btn_save">存檔</span><button class="btn btn-edit-save" onclick="saveData()">💾</button></div>
        </div>
        <!-- 預覽模式選單 -->
        <div id="group-preview" class="fab-menu hidden">
            <div class="fab-row"><span class="fab-label" data-i18n="btn_word">下載Word</span><button class="btn btn-pre-word" onclick="downloadWord()">📄</button></div>
            <div class="fab-row"><span class="fab-label" data-i18n="btn_pdf">下載PDF</span><button class="btn btn-pre-pdf" onclick="downloadPDF()">📥</button></div>
            <div class="fab-row"><span class="fab-label" data-i18n="btn_back">返回編輯</span><button class="btn btn-pre-back" onclick="toggleMode(false)">⬅</button></div>
        </div>
        <!-- 主按鈕 (展開/收合) -->
        <button class="fab-main" id="fabMain" onclick="toggleFab()">☰</button>
    </div>

    <script>
        const AFFILIATE_CONFIG = {
            marker: "699011", // TP Marker
            trs: "492505",    // TRS
            img_gen_url: "https://image.pollinations.ai/prompt/" 
        };

        window.addEventListener('DOMContentLoaded', () => {
            applyLang();
            document.getElementById('fabMain').textContent = '✕';
            // 可拖曳 FAB
            const fab = document.getElementById('fabContainer');
            if (!fab) return;
            let dragging = false, startX, startY, origRight, origBottom;
            fab.addEventListener('pointerdown', function(e) {
                if (e.target.closest('button')) return;
                dragging = true;
                startX = e.clientX; startY = e.clientY;
                const rect = fab.getBoundingClientRect();
                origRight = window.innerWidth - rect.right;
                origBottom = window.innerHeight - rect.bottom;
                fab.setPointerCapture(e.pointerId);
                e.preventDefault();
            });
            fab.addEventListener('pointermove', function(e) {
                if (!dragging) return;
                const dx = e.clientX - startX, dy = e.clientY - startY;
                let newRight = origRight - dx;
                let newBottom = origBottom - dy;
                newRight = Math.max(8, Math.min(window.innerWidth - 70, newRight));
                newBottom = Math.max(8, Math.min(window.innerHeight - 70, newBottom));
                fab.style.right = newRight + 'px';
                fab.style.bottom = newBottom + 'px';
            });
            fab.addEventListener('pointerup', function() { dragging = false; });
        });
        
        const i18n = {
            "zh-TW": {
                title: "旅遊行程", client: "客戶名稱：", contact: "聯絡窗口：", phone: "聯絡電話：", meetup: "集合地點：", date: "出發日期：", days: "行程天數：",
                c1_label: "個人團費", c2_label: "交通", c3_label: "餐食", c4_label: "住宿", c5_label: "費用包含",
                ph_agency: "輸入旅行社名稱", c1_ph: "$ /人", c2_ph: "交通說明: 車資/機票", c3_ph: "早午晚餐說明", c4_ph: "飯店名稱與房型", c5_ph: "門票保險等",
                btn_save: "存檔", btn_load: "讀檔", btn_gen: "1.行程", btn_view: "2.預覽", btn_back: "返回編輯", btn_pdf: "下載PDF", btn_word: "下載Word",
                click_hint: "請點擊下方「1. 行程」", day_header: "Day", note_label: "當日備註：", add_item: "+ 增加項目",
                ph_time: "00:00", ph_content: "輸入地名 (如: 大阪, 首爾)", 
                
                // V36: 全部使用 Klook (修復版網址)
                btn_search_hotel: '🏨 找 "{city}" 住宿',
                btn_search_act: '🎡 找 "{city}" 景點',
                ph_paste_link: "在此貼上網址 (Paste Link)...",
                btn_confirm: "確認連結",
                link_saved: "預訂連結",
                
                msg_saved: "✅ 存檔成功", msg_loaded: "📂 讀檔成功", msg_no_record: "無存檔紀錄",
                
                word_cost_title: "■ 費用明細",
                word_link_prefix: "預訂連結"
            },
            "en": {
                title: "Travel Itinerary", client: "Client:", contact: "Contact:", phone: "Phone:", meetup: "Meeting Point:", date: "Start Date:", days: "Days:",
                c1_label: "Fee", c2_label: "Transport", c3_label: "Meals", c4_label: "Hotel", c5_label: "Included",
                ph_agency: "Agency Name", c1_ph: "$", c2_ph: "Details", c3_ph: "Details", c4_ph: "Hotel Name", c5_ph: "Items",
                btn_save: "Save", btn_load: "Load", btn_gen: "Build", btn_view: "Preview", btn_back: "Edit", btn_pdf: "PDF", btn_word: "Word",
                click_hint: "Click 'Build' below", day_header: "Day", note_label: "Notes:", add_item: "+ Item",
                ph_time: "00:00", ph_content: "Type city (e.g. London)", 
                
                btn_search_hotel: '🏨 Find "{city}" Hotel',
                btn_search_act: '🎡 Find "{city}" Activity',
                ph_paste_link: "Paste URL here...",
                btn_confirm: "Save Link",
                link_saved: "Booking Link",
                
                msg_saved: "✅ Saved Successfully", msg_loaded: "📂 Loaded Successfully", msg_no_record: "No records found",
                
                word_cost_title: "■ Costs",
                word_link_prefix: "Booking Link"
            }
        };

        let currentLang = "zh-TW";
        function changeLang() { currentLang = document.getElementById('langSelect').value; applyLang(); }
        
        function applyLang() {
            const t = i18n[currentLang];
            document.querySelectorAll('[data-i18n]').forEach(el => { const key = el.getAttribute('data-i18n'); if(t[key]) el.textContent = t[key]; });
            document.querySelectorAll('[data-ph]').forEach(el => { const key = el.getAttribute('data-ph'); if(t[key]) el.placeholder = t[key]; });
            document.querySelectorAll('.day-header').forEach(el => { if(el.dataset.day) el.innerHTML = `${t.day_header} ${el.dataset.day} (${el.dataset.date})`; });
            document.querySelectorAll('.note-label').forEach(el => el.textContent = t.note_label);
            document.querySelectorAll('.btn-add').forEach(el => el.textContent = t.add_item);
            document.querySelectorAll('.ipt-time').forEach(el => el.placeholder = t.ph_time);
            document.querySelectorAll('.item-content').forEach(el => el.placeholder = t.ph_content);
            document.querySelectorAll('.ipt-paste-link').forEach(el => el.placeholder = t.ph_paste_link);
            document.querySelectorAll('.btn-save-link').forEach(el => el.textContent = t.btn_confirm);
            document.querySelectorAll('.badge-text').forEach(el => el.childNodes[0].nodeValue = t.link_saved); 
            document.querySelectorAll('.itinerary-item').forEach(item => updateCardDisplay(item));
        }

        function showToast(msg) {
            const box = document.getElementById('toastContainer');
            const toast = document.createElement('div'); toast.className = 'toast-msg'; toast.innerHTML = msg;
            box.appendChild(toast); setTimeout(()=>toast.classList.add('show'),100);
            setTimeout(()=>{toast.classList.remove('show'); setTimeout(()=>toast.remove(),400)},2500);
        }
        function autoHeight(el) { el.style.height='auto'; el.style.height=el.scrollHeight+'px'; }

        document.addEventListener('input', function(e) {
            if (e.target.classList.contains('ipt-time')) {
                let val = e.target.value.replace(/\D/g, '');
                if (val.length >= 3) e.target.value = val.slice(0, 2) + ':' + val.slice(2, 4);
            }
            if (e.target.classList.contains('item-content')) {
                detectKeywords(e.target);
            }
        });

        function detectKeywords(textarea) {
            const val = textarea.value.trim();
            const parent = textarea.closest('.itinerary-item');
            
            if(parent.querySelector('.ipt-c-link').value) {
                parent.querySelector('.smart-suggestion-area').innerHTML = '';
                return;
            }

            let suggestArea = parent.querySelector('.smart-suggestion-area');
            if (!suggestArea) {
                suggestArea = document.createElement('div');
                suggestArea.className = 'smart-suggestion-area tools-area no-print';
                parent.querySelector('.content-col').appendChild(suggestArea);
            }
            suggestArea.innerHTML = ''; 
            const t = i18n[currentLang];
            const possibleCity = val.split(/[\s,，、]+/).pop(); 

            if(possibleCity && possibleCity.length > 1) {
                const btnBooking = document.createElement('div'); btnBooking.className = 'suggestion-btn';
                btnBooking.innerHTML = t.btn_search_hotel.replace('{city}', possibleCity);
                btnBooking.onclick = () => openSearchAndInput(parent, possibleCity, 'booking');
                suggestArea.appendChild(btnBooking);

                const btnKlook = document.createElement('div'); btnKlook.className = 'suggestion-btn';
                btnKlook.innerHTML = t.btn_search_act.replace('{city}', possibleCity);
                btnKlook.onclick = () => openSearchAndInput(parent, possibleCity, 'klook');
                suggestArea.appendChild(btnKlook);
            }
        }

        // 🔥 V36: 修正 Klook 住宿搜尋連結 (使用全站搜尋 + "飯店" 關鍵字)
        function openSearchAndInput(itemRow, city, type) {
            const marker = AFFILIATE_CONFIG.marker;
            const trs = AFFILIATE_CONFIG.trs;
            let targetUrl = "";

            if(type === 'booking') {
                // Klook Hotels (Global Search trick: "City + Hotel") -> Robust & works!
                const searchKeyword = city + (currentLang === 'zh-TW' ? ' 飯店' : ' Hotel');
                const u = `https://www.klook.com/search?query=${encodeURIComponent(searchKeyword)}`;
                targetUrl = `https://tp.media/r?marker=${marker}&trs=${trs}&p=4110&u=${encodeURIComponent(u)}`;
            } else {
                // Klook Activities (Standard search)
                const u = `https://www.klook.com/search?query=${encodeURIComponent(city)}`;
                targetUrl = `https://tp.media/r?marker=${marker}&trs=${trs}&p=4110&u=${encodeURIComponent(u)}`;
            }

            window.open(targetUrl, '_blank');

            const inputContainer = itemRow.querySelector('.link-input-container');
            inputContainer.style.display = 'flex';
            itemRow.querySelector('.ipt-paste-link').focus();
            
            const area = itemRow.querySelector('.smart-suggestion-area');
            if(area) area.innerHTML = ''; 
        }

        function saveLink(btn) {
            const parent = btn.closest('.itinerary-item');
            const link = parent.querySelector('.ipt-paste-link').value;
            if(!link) return alert("Please paste a link");
            parent.querySelector('.ipt-c-link').value = link;
            updateCardDisplay(parent);
        }

        function removeLink(btn) {
            const parent = btn.closest('.itinerary-item');
            parent.querySelector('.ipt-c-link').value = "";
            parent.querySelector('.ipt-paste-link').value = "";
            updateCardDisplay(parent);
            detectKeywords(parent.querySelector('.item-content'));
        }

        function updateCardDisplay(itemRow) {
            const link = itemRow.querySelector('.ipt-c-link').value;
            const inputContainer = itemRow.querySelector('.link-input-container');
            const badge = itemRow.querySelector('.confirmed-link-badge');
            const t = i18n[currentLang];

            if (link) {
                inputContainer.style.display = 'none';
                badge.style.display = 'inline-flex';
                badge.innerHTML = `<span class="badge-text">${t.link_saved}</span>: <a href="${link}" target="_blank" class="badge-url">${link}</a> <button class="btn-del-link" onclick="removeLink(this)">×</button>`;
            } else {
                badge.style.display = 'none';
                if(itemRow.querySelector('.ipt-paste-link').value === "") {
                    inputContainer.style.display = 'none';
                }
            }
        }

        function buildItinerary(existingData=null) {
            const days = existingData ? existingData.daysCount : document.getElementById('ipt_days').value;
            const start = document.getElementById('ipt_date').value;
            const container = document.getElementById('itineraryContainer');
            container.innerHTML = '';
            let d = start ? new Date(start) : null;
            const t = i18n[currentLang];

            for(let i=1; i<=days; i++) {
                let dateStr = d ? `${d.getMonth()+1}/${d.getDate()}` : `Day ${i}`;
                if(d) d.setDate(d.getDate()+1);
                let itemsHtml = (existingData && existingData.days[i-1]) 
                    ? existingData.days[i-1].items.map(item => createItemRow(item)).join('')
                    : createItemRow({});
                const noteVal = (existingData && existingData.days[i-1]) ? existingData.days[i-1].note : "";
                const group = document.createElement('div'); group.className = 'day-group';
                group.innerHTML = `<div class="day-header" data-day="${i}" data-date="${dateStr}">${t.day_header} ${i} (${dateStr})</div><div class="items-list">${itemsHtml}</div><div class="add-act-wrapper"><button class="btn-add" onclick="addAct(this)">${t.add_item}</button></div>`;
                container.appendChild(group);
            }
            document.querySelectorAll('textarea').forEach(t => autoHeight(t));
            document.querySelectorAll('.itinerary-item').forEach(item => updateCardDisplay(item));
        }

        function createItemRow(data) {
            const t = i18n[currentLang];
            const { time="", content="", cLink="" } = data;
            return `<div class="itinerary-item">
                <div class="time-col">
                    <input type="text" class="ipt-time" value="${time}" placeholder="${t.ph_time}" maxlength="5">
                </div>
                
                <div class="content-col">
                    <textarea class="item-content" placeholder="${t.ph_content}" rows="1" oninput="autoHeight(this)">${content}</textarea>
                    
                    <div class="link-input-container tools-area">
                        <input type="text" class="ipt-paste-link" placeholder="${t.ph_paste_link}">
                        <button class="btn-save-link" onclick="saveLink(this)">${t.btn_confirm}</button>
                    </div>

                    <div class="confirmed-link-badge"></div>
                    <div class="card-editor"><input type="text" class="card-input ipt-c-link" value="${cLink}"></div>
                </div>

                <button class="btn-del-item no-print" onclick="this.closest('.itinerary-item').remove()">×</button>
            </div>`;
        }

        function addAct(btn) { btn.closest('.day-group').querySelector('.items-list').appendChild(document.createElement('div')).outerHTML = createItemRow({}); }
        
        function toggleMode(isPreview) {
            document.body.classList.toggle('preview-mode', isPreview);
            const editGrp = document.getElementById('group-edit');
            const preGrp = document.getElementById('group-preview');
            editGrp.classList.toggle('hidden', isPreview);
            preGrp.classList.toggle('hidden', !isPreview);
            // 切換後展開選單，移除 collapsed
            fabOpen = true;
            document.getElementById('fabMain').textContent = '✕';
            editGrp.classList.remove('collapsed');
            preGrp.classList.remove('collapsed');
            document.querySelectorAll('input, textarea').forEach(el => { if(!el.classList.contains('ipt-c-link')) el.readOnly = isPreview; });
            if(isPreview) document.querySelectorAll('textarea').forEach(t => autoHeight(t));
        }

        function saveData() {
            const days = [];
            document.querySelectorAll('.day-group').forEach(group => {
                const items = [];
                group.querySelectorAll('.itinerary-item').forEach(it => {
                    items.push({ 
                        time: it.querySelector('.ipt-time').value, content: it.querySelector('.item-content').value,
                        cLink: it.querySelector('.ipt-c-link').value
                    });
                });
                days.push({ items: items });
            });
            const data = {
                lang: currentLang,
                agency: document.getElementById('ipt_agency').value, company: document.getElementById('ipt_company').value,
                contact: document.getElementById('ipt_contact').value, phone: document.getElementById('ipt_phone').value,
                meetup: document.getElementById('ipt_meetup').value,
                date: document.getElementById('ipt_date').value, daysCount: document.getElementById('ipt_days').value,
                costs: [1,2,3,4,5].map(i => document.getElementById('ipt_c'+i).value), days: days
            };
            localStorage.setItem('trip_v36_data', JSON.stringify(data));
            showToast(i18n[currentLang].msg_saved); 
        }
        function loadData() {
            const data = JSON.parse(localStorage.getItem('trip_v36_data'));
            if(!data) return alert(i18n[currentLang].msg_no_record); 
            if(data.lang) { document.getElementById('langSelect').value = data.lang; changeLang(); }
            document.getElementById('ipt_agency').value = data.agency||""; document.getElementById('ipt_company').value = data.company||"";
            document.getElementById('ipt_contact').value = data.contact||""; document.getElementById('ipt_phone').value = data.phone||"";
            if(document.getElementById('ipt_meetup')) document.getElementById('ipt_meetup').value = data.meetup||"";
            document.getElementById('ipt_date').value = data.date||""; document.getElementById('ipt_days').value = data.daysCount||3;
            data.costs.forEach((v, i) => { if(document.getElementById('ipt_c'+(i+1))) document.getElementById('ipt_c'+(i+1)).value = v; });
            buildItinerary(data); 
            showToast(i18n[currentLang].msg_loaded); 
        }
        function downloadPDF() {
            const element = document.getElementById('pdfArea');
            const originalScrollY = window.scrollY; window.scrollTo(0, 0);
            element.classList.add('pdf-render-fix');
            
            const agencyInput = document.getElementById('ipt_agency');
            const originalPlaceholder = agencyInput.placeholder;
            if(!agencyInput.value.trim()) { agencyInput.placeholder = ""; agencyInput.style.borderBottom = "none"; }

            const links = document.querySelectorAll('.confirmed-link-badge .badge-url');
            const originalTexts = [];
            links.forEach((a, index) => {
                originalTexts[index] = a.textContent;
                let displayLink = a.href;
                try {
                    const urlObj = new URL(a.href);
                    displayLink = urlObj.hostname + (urlObj.pathname.length > 1 ? urlObj.pathname : "") + "...";
                    if(displayLink.length > 45) displayLink = displayLink.substring(0, 42) + "...";
                } catch(e) {}
                a.textContent = displayLink;
            });

            document.querySelectorAll('textarea').forEach(t => autoHeight(t));
            
            setTimeout(() => {
                html2pdf().set({ margin: 0, filename: `Itinerary.pdf`, image: { type: 'jpeg', quality: 0.98 }, html2canvas: { scale: 2, useCORS: true, width: 800 }, jsPDF: { unit: 'pt', format: 'a4' } }).from(element).save()
                .then(() => { 
                    element.classList.remove('pdf-render-fix'); 
                    if(!agencyInput.value.trim()) { agencyInput.placeholder = originalPlaceholder; agencyInput.style.borderBottom = ""; }
                    links.forEach((a, index) => { a.textContent = originalTexts[index]; });
                    document.querySelectorAll('textarea').forEach(t => autoHeight(t)); window.scrollTo(0, originalScrollY); 
                });
            }, 100);
        }
        function downloadWord() {
            const t = i18n[currentLang];
            let html = '<html xmlns:o=\'urn:schemas-microsoft-com:office:office\' xmlns:w=\'urn:schemas-microsoft-com:office:word\'><head><meta charset="utf-8"><style>body{font-family:"Microsoft JhengHei";}table{border-collapse:collapse;width:100%;}</style></head><body>';
            
            const agency = document.getElementById('ipt_agency').value;
            if(agency && agency.trim() !== "") { html += '<p style="text-align:center;font-size:20pt;font-weight:bold;">' + agency + '</p>'; }
            html += '<p style="text-align:center;font-size:24pt;font-weight:bold;border-bottom:2px double #000;">' + t.title + '</p>';
            
            html += '<table border="1" style="border-collapse:collapse;width:100%;">';
            html += '<tr><td style="font-weight:bold;padding:6px 10px;background:#f8f9fa;width:20%;">' + t.client + '</td><td style="padding:6px 10px;width:30%;">' + document.getElementById('ipt_company').value + '</td><td style="font-weight:bold;padding:6px 10px;background:#f8f9fa;width:20%;">' + t.contact + '</td><td style="padding:6px 10px;width:30%;">' + document.getElementById('ipt_contact').value + '</td></tr>';
            html += '<tr><td style="font-weight:bold;padding:6px 10px;background:#f8f9fa;">' + t.phone + '</td><td style="padding:6px 10px;">' + document.getElementById('ipt_phone').value + '</td><td style="font-weight:bold;padding:6px 10px;background:#f8f9fa;">' + t.date + '</td><td style="padding:6px 10px;">' + document.getElementById('ipt_date').value + '</td></tr>';
            html += '<tr><td style="font-weight:bold;padding:6px 10px;background:#f8f9fa;">' + t.days + '</td><td style="padding:6px 10px;">' + document.getElementById('ipt_days').value + '</td><td style="font-weight:bold;padding:6px 10px;background:#f8f9fa;">' + t.meetup + '</td><td style="padding:6px 10px;">' + document.getElementById('ipt_meetup').value + '</td></tr>';
            html += '</table><br>';

            document.querySelectorAll('.day-group').forEach(function(group) {
                html += '<table border="1" style="border-collapse:collapse;width:100%;margin-bottom:20px;"><tr style="background:#2c3e50;color:#fff;"><td colspan="2" style="padding:10px;font-weight:bold;">' + group.querySelector('.day-header').innerText + '</td></tr>';
                group.querySelectorAll('.itinerary-item').forEach(function(it) {
                    let content = it.querySelector('.item-content').value.replace(/\n/g, '<br>');
                    const cLink = it.querySelector('.ipt-c-link').value;
                    if(cLink) { 
                        let displayLink = cLink;
                        try {
                            const urlObj = new URL(cLink);
                            displayLink = urlObj.hostname + (urlObj.pathname.length > 1 ? urlObj.pathname : "") + "...";
                            if(displayLink.length > 45) displayLink = displayLink.substring(0, 42) + "...";
                        } catch(e) {}
                        content += '<p style="margin-top:2px;margin-bottom:0;"><a href="' + cLink + '" style="color:#003580;text-decoration:underline;font-size:10pt;">' + t.word_link_prefix + ': ' + displayLink + '</a></p>';
                    }
                    html += '<tr><td style="width:80px;padding:10px;border:1px solid #eee;text-align:center;font-weight:bold;vertical-align:middle;">' + it.querySelector('.ipt-time').value + '</td><td style="padding:10px;border:1px solid #eee;">' + content + '</td></tr>';
                });
                html += '</table>';
            });

            html += '<br><p style="font-size:14pt;font-weight:bold;margin-bottom:10px;">' + t.word_cost_title + '</p><table style="width:100%;border:1px solid #000;">';
            const costLabels = [];
            for(let i=1; i<=5; i++) costLabels.push(document.querySelector('[data-i18n="c' + i + '_label"]').textContent);
            for(let i=1; i<=5; i++) {
                const val = document.getElementById('ipt_c'+i).value;
                html += '<tr><td style="width:25%;background:#f8f9fa;border:1px solid #000;padding:5px;font-weight:bold;">' + costLabels[i-1] + '</td><td style="width:75%;border:1px solid #000;padding:5px;">' + val + '</td></tr>';
            }
            html += '</table>';
            saveAs(new Blob([html], {type:'application/msword'}), 'Itinerary.doc');
        }
        // FAB 展開/收合
        let fabOpen = true;
        function toggleFab() {
            fabOpen = !fabOpen;
            const editGrp = document.getElementById('group-edit');
            const previewGrp = document.getElementById('group-preview');
            document.getElementById('fabMain').textContent = fabOpen ? '✕' : '☰';
            [editGrp, previewGrp].forEach(m => {
                if (m && !m.classList.contains('hidden')) {
                    m.classList.toggle('collapsed', !fabOpen);
                }
            });
        }

    </script>
